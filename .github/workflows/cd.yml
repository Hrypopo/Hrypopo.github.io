name: CD Pipeline

# DISABLED: no package.json / staging env yet — auto-triggers are off so this
# doesn't fail on every push. Re-enable the push/tags block once the build and
# deploy targets exist. Until then it can still be run manually from Actions.
on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]
  #   tags:
  #     - 'v*'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.chevza.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: staging

      - name: Deploy to staging
        run: echo "Deploy to staging environment"
        # Add actual deployment commands here

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          API_URL: https://staging.chevza.com

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://chevza.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to production
        run: echo "Deploy to production environment"
        # Add actual deployment commands here

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          API_URL: https://chevza.com

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
