<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FileMayor — Social carousels</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f1e8;
    --bg-deep:#efe9dc;
    --ink:#171513;
    --ink-soft:#3a342d;
    --muted:#7c766b;
    --rule:rgba(23,21,19,.16);
    --rule-soft:rgba(23,21,19,.08);
    --dark:#0f0d0a;
    --dark-2:#15120e;
    --cream:#f3eee2;
    --accent:#a8552a;
    --term:#a3c977;
    --serif:"Instrument Serif", "Times New Roman", serif;
    --sans:"Geist", ui-sans-serif, system-ui, sans-serif;
    --mono:"Geist Mono", ui-monospace, Menlo, monospace;
  }

  /* shared slide styling */
  .s{
    width:1080px; height:1350px;
    background:var(--bg); color:var(--ink);
    font-family:var(--sans);
    position:relative;
    overflow:hidden;
    box-sizing:border-box;
    padding:80px 72px;
    display:flex; flex-direction:column;
  }
  .s.dark{ background:var(--dark); color:var(--cream); }
  .s.deep{ background:var(--bg-deep); }

  /* chrome */
  .top, .bot{
    position:absolute; left:72px; right:72px;
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:var(--mono); font-size:18px; letter-spacing:.04em;
    color:var(--muted);
  }
  .top{ top:48px; }
  .bot{ bottom:48px; }
  .s.dark .top, .s.dark .bot{ color:#8a8377; }
  .dot{ color:var(--accent); }
  .blink{ animation:blink 1.1s steps(1) infinite; color:var(--accent); }
  @keyframes blink{ 50%{ opacity:0; } }

  /* type */
  .eyebrow{
    font-family:var(--mono); font-size:18px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--muted); font-weight:400;
  }
  .s.dark .eyebrow{ color:#bcb4a6; }
  .h1{ font-family:var(--serif); font-size:148px; line-height:.92; letter-spacing:-.025em; font-weight:400; margin:0; }
  .h2{ font-family:var(--serif); font-size:112px; line-height:.95; letter-spacing:-.02em; font-weight:400; margin:0; }
  .h3{ font-family:var(--serif); font-size:84px; line-height:1.0; letter-spacing:-.015em; font-weight:400; margin:0; }
  .h4{ font-family:var(--serif); font-size:64px; line-height:1.05; letter-spacing:-.01em; font-weight:400; margin:0; }
  .ital{ font-style:italic; }
  .accent{ color:var(--accent); }
  .muted{ color:var(--muted); }
  .mono{ font-family:var(--mono); }
  .sub{ font-size:28px; line-height:1.35; color:var(--ink-soft); max-width:920px; }
  .body{ font-size:24px; line-height:1.45; color:var(--ink-soft); max-width:920px; }
  .small{ font-size:20px; line-height:1.45; color:var(--muted); }

  .grow{ flex:1 1 auto; min-height:0; }
  .center{ justify-content:center; align-items:flex-start; }
  .col{ display:flex; flex-direction:column; }
  .row{ display:flex; }
  .between{ justify-content:space-between; }
  .gap-s{ gap:18px; } .gap-m{ gap:36px; } .gap-l{ gap:56px; }

  /* terminal block */
  .term{
    background:var(--dark-2); color:var(--cream);
    font-family:var(--mono); font-size:22px; line-height:1.55;
    padding:36px 42px;
    border:1px solid rgba(243,238,226,.10);
    border-radius:8px;
    white-space:pre;
  }
  .term .cmd{ color:#fff; }
  .term .prompt{ color:var(--accent); }
  .term .ok{ color:var(--term); }
  .term .dim{ color:#8a8377; }
  .term .key{ color:#e9b06a; }
  .term .warn{ color:#e07a5f; }

  /* chips */
  .chip{
    display:inline-block; font-family:var(--mono); font-size:16px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--muted);
    padding:7px 14px; border:1px solid var(--rule); border-radius:999px;
  }
  .s.dark .chip{ border-color:rgba(243,238,226,.20); color:#bcb4a6; }
  .chip.live{ color:var(--accent); border-color:rgba(168,85,42,.4); }
  .chip.live::before{ content:"●  "; color:var(--accent); }
  .chip.term{ color:var(--term); border-color:rgba(163,201,119,.4); }
  .chip.term::before{ content:"●  "; color:var(--term); }

  /* wordmark */
  .wm{ font-family:var(--serif); font-size:36px; letter-spacing:-.01em; line-height:1; }
  .wm .d{ color:var(--accent); }
  .wm-by{ font-family:var(--mono); font-size:14px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-left:12px; }
  .s.dark .wm-by{ color:#8a8377; }

  /* footer cta block */
  .cta{
    border-top:1px solid var(--rule);
    padding-top:24px; margin-top:auto;
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:var(--mono); font-size:18px; color:var(--muted);
  }
  .s.dark .cta{ border-color:rgba(243,238,226,.18); color:#8a8377; }
  .cta .arrow{ color:var(--accent); }

  /* swipe hint */
  .swipe{
    position:absolute; right:72px; bottom:120px;
    font-family:var(--mono); font-size:16px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--muted);
    display:flex; align-items:center; gap:10px;
  }
  .swipe .arr{ color:var(--accent); }
  .s.dark .swipe{ color:#8a8377; }

  /* numbered marker */
  .marker{
    font-family:var(--mono); font-size:16px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--muted);
  }

  /* verb badge */
  .verb-badge{
    display:inline-block; font-family:var(--mono); font-size:18px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--accent);
    padding:8px 16px; border:1px solid rgba(168,85,42,.4); border-radius:4px;
  }

  /* signature */
  .sig{ font-family:var(--mono); font-size:16px; color:var(--muted); letter-spacing:.04em; }

  /* hand-drawn highlight */
  .hl{
    background:linear-gradient(transparent 60%, rgba(168,85,42,.22) 60%);
    padding:0 4px;
  }

  /* downloads "before" file list */
  .files{
    font-family:var(--mono); font-size:18px; line-height:1.5;
    color:var(--ink-soft);
    padding:24px 28px;
    background:var(--bg-deep);
    border:1px dashed var(--rule);
    border-radius:6px;
  }
  .files .f{ display:grid; grid-template-columns:34px 1fr 90px; gap:12px; padding:4px 0; }
  .files .f.dim{ color:var(--muted); }
  .files .ic{ color:var(--muted); }
  .files .size{ color:var(--muted); text-align:right; font-size:16px; }

  /* big stat */
  .stat-n{ font-family:var(--serif); font-size:240px; line-height:.9; letter-spacing:-.03em; }
  .stat-n small{ font-family:var(--mono); font-size:36px; color:var(--muted); letter-spacing:.06em; vertical-align:top; }
  .stat-l{ font-family:var(--mono); font-size:18px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }

  /* layer chips for doctrine */
  .layers{ display:grid; grid-template-columns:repeat(2,1fr); gap:0; border-top:1px solid var(--rule); border-left:1px solid var(--rule); }
  .layers .l{ padding:24px 24px 28px; border-right:1px solid var(--rule); border-bottom:1px solid var(--rule); }
  .layers .ix{ font-family:var(--mono); font-size:14px; letter-spacing:.16em; color:var(--muted); }
  .layers .nm{ font-family:var(--serif); font-style:italic; font-size:44px; line-height:1; margin:8px 0 8px; }
  .layers .ds{ font-size:17px; line-height:1.4; color:var(--ink-soft); }

  /* country dot */
  .za-dot{
    width:14px; height:14px; border-radius:50%; background:var(--accent);
    display:inline-block; margin-right:10px; vertical-align:middle;
  }

  /* pull quote */
  .pull{
    font-family:var(--serif); font-size:84px; line-height:1.02;
    letter-spacing:-.02em;
  }

  /* big plus before/after divider */
  .arrow-big{
    font-family:var(--serif); font-size:120px; color:var(--accent);
    line-height:.9;
  }

</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="carousels.jsx"></script>

</body>
</html>
